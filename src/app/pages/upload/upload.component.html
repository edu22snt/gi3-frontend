<mat-card class="upload-card">

  <mat-card-title>Importar Planilha</mat-card-title>

  <mat-card-content>

    <div class="upload-container">

      <!-- SELECT -->
      <mat-form-field appearance="outline">
        <mat-label>Tipo da Planilha</mat-label>
        <mat-select [(value)]="tipoPlanilha">
          <mat-option value="BANCORBRAS">Bancorbras</mat-option>
          <mat-option value="HS">HS</mat-option>
          <mat-option value="PRESTACAO_SERVICO">Prestação de Serviço</mat-option>
        </mat-select>
      </mat-form-field>

      <!-- BOTÃO DE ARQUIVO -->
      <button mat-stroked-button color="primary" (click)="fileInput.click()">
        Selecionar arquivo
      </button>

      <input
        type="file"
        #fileInput
        hidden
        (change)="onFileSelected($event)"
        accept=".xlsx,.xls,.csv"
      />

      <div class="file-info" *ngIf="fileName">
        📄 {{ fileName }}
      </div>

      <div class="error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

    </div>

  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-raised-button color="primary"
            (click)="upload()"
            [disabled]="!selectedFile || !tipoPlanilha || loading">

      <!-- <mat-progress-spinner
        *ngIf="loading"
        diameter="20"
        mode="indeterminate">
      </mat-progress-spinner> -->

      <span *ngIf="!loading">Importar</span>

    </button>
  </mat-card-actions>

</mat-card>
