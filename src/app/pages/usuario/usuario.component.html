<h1>Listar Usuários</h1>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8 full-width">

  <!-- ID -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ID </th>
    <td mat-cell *matCellDef="let element"> {{ element.id }} </td>
  </ng-container>

  <!-- Usuário -->
  <ng-container matColumnDef="username">
    <th mat-header-cell *matHeaderCellDef> Usuário </th>
    <td mat-cell *matCellDef="let element"> {{ element.username }} </td>
  </ng-container>

  <!-- Roles -->
  <ng-container matColumnDef="roles">
    <th mat-header-cell *matHeaderCellDef> Roles </th>
    <td mat-cell *matCellDef="let element">
    <mat-chip-set>
        <mat-chip>
            @for (item of element.roles; track $index; let isLast = $last) {
                {{ item.nome.replace('ROLE_', '') }}
                @if (!isLast) {, }
            }
        </mat-chip>
    </mat-chip-set>
    </td>
  </ng-container>


    <!-- Ação -->
  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef class="acoes-header"> Ações </th>
    <td mat-cell *matCellDef="let element" class="acoes-cell">

      <button mat-icon-button color="primary" (click)="view(element.id)">
        <mat-icon>visibility</mat-icon>
      </button>

      <button mat-icon-button color="accent" (click)="edit(element.id)">
        <mat-icon>edit</mat-icon>
      </button>

      <button mat-icon-button color="warn" (click)="confirmDelete(element)">
        <mat-icon>delete</mat-icon>
      </button>

    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<mat-paginator
  [length]="totalElements"
  [pageSize]="pageSize"
  [pageSizeOptions]="[5, 10, 20]"
  (page)="onPageChange($event)">
</mat-paginator>
