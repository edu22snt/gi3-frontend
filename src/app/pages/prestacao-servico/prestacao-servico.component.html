<div class="header">
  <div>
    <h1>Listar Prestações de Serviço</h1>
  </div>
  <button
    mat-icon-button
    color="accent"
    (click)="new()">
    <mat-icon>add</mat-icon>
  </button>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8 full-width">

  <!-- ID -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ID </th>
    <td mat-cell *matCellDef="let element"> {{ element.id }} </td>
  </ng-container>

  <!-- Vendedor -->
  <ng-container matColumnDef="vendedor">
    <th mat-header-cell *matHeaderCellDef> Vendedor </th>
    <td mat-cell *matCellDef="let element"> {{ element.vendedor }} </td>
  </ng-container>

  <!-- Contrato -->
  <ng-container matColumnDef="contrato">
    <th mat-header-cell *matHeaderCellDef> Contrato </th>
    <td mat-cell *matCellDef="let element"> {{ element.contrato }} </td>
  </ng-container>

  <!-- Parcela -->
  <ng-container matColumnDef="parcela">
    <th mat-header-cell *matHeaderCellDef> Parcela </th>
    <td mat-cell *matCellDef="let element"> {{ element.parcela }} </td>
  </ng-container>

  <!-- Valor -->
  <ng-container matColumnDef="valor">
    <th mat-header-cell *matHeaderCellDef> Valor </th>
    <td mat-cell *matCellDef="let element"> {{ element.valor }} </td>
  </ng-container>

  <!-- Empresa -->
  <ng-container matColumnDef="empresa">
    <th mat-header-cell *matHeaderCellDef> Empresa </th>
    <td mat-cell *matCellDef="let element"> {{ element.empresa }} </td>
  </ng-container>

    <!-- Ação -->
  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef class="acoes-header"> Ações </th>
    <td mat-cell *matCellDef="let element" class="acoes-cell">

      <button mat-icon-button color="primary" [routerLink]="['/prestacao-servico/view', element.id]">
        <mat-icon>visibility</mat-icon>
      </button>

      <button mat-icon-button color="accent" [routerLink]="['/prestacao-servico/edit', element.id]">
        <mat-icon>edit</mat-icon>
      </button>

      <button mat-icon-button color="warn" (click)="confirmDelete(element.id)">
        <mat-icon>delete</mat-icon>
      </button>

    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<mat-paginator
  [length]="totalElements"
  [pageSize]="pageSize"
  [pageSizeOptions]="[5, 10, 20]"
  (page)="onPageChange($event)">
</mat-paginator>
