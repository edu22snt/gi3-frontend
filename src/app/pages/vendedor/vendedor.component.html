<div class="header">
  <div>
    <h1>Listar vendedores</h1>
  </div>
  <button
    mat-icon-button
    color="accent"
    (click)="new()">
    <mat-icon>add</mat-icon>
  </button>
</div>

<div class="search-container">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Procurar</mat-label>

    <input
      matInput
      [(ngModel)]="searchItem"
      (keyup.enter)="searchByKeyword()"
      placeholder="Digite para pesquisar..."
    />

    <button
      mat-icon-button
      matSuffix
      color="primary"
      (click)="searchByKeyword()">
      <mat-icon>search</mat-icon>
    </button>

    @if (searchItem) {
      <button
        mat-icon-button
        matSuffix
        (click)="searchItem = ''; searchByKeyword()">
        <mat-icon>close</mat-icon>
      </button>
    }

  </mat-form-field>
  <button
    class="posicao-print"
    mat-icon-button
    color="primary"
    (click)="imprimir()">
    <mat-icon>print</mat-icon>
  </button>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8 full-width">

  <ng-container matColumnDef="nome">
    <th mat-header-cell *matHeaderCellDef> Nome </th>
    <td mat-cell *matCellDef="let element"> {{ element.nome }} </td>
  </ng-container>

  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef> E-mail </th>
    <td mat-cell *matCellDef="let element"> {{ element.email }} </td>
  </ng-container>

  <ng-container matColumnDef="telefone">
    <th mat-header-cell *matHeaderCellDef> Telefone </th>
    <td mat-cell *matCellDef="let element"> {{ element.telefone }} </td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef> Status </th>
    <td mat-cell *matCellDef="let element"> {{ element.status }} </td>
  </ng-container>

  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef class="acoes-header"> Ações </th>
    <td mat-cell *matCellDef="let element" class="acoes-cell">

      <button mat-icon-button color="primary" [routerLink]="['/vendedor/view', element.id]">
        <mat-icon>visibility</mat-icon>
      </button>

      <button mat-icon-button color="accent" [routerLink]="['/vendedor/edit', element.id]">
        <mat-icon>edit</mat-icon>
      </button>

      <button mat-icon-button color="warn" (click)="confirmDelete(element.id)">
        <mat-icon>delete</mat-icon>
      </button>

    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<mat-paginator
  [length]="totalElements"
  [pageSize]="pageSize"
  [pageSizeOptions]="[5, 10, 20]"
  (page)="onPageChange($event)">
</mat-paginator>
